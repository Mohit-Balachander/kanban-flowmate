apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanban-flowmate
  labels:
    app: kanban-flowmate
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kanban-flowmate
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kanban-flowmate
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: kanban-flowmate
          image: kanban-flowmate:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/board
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/board
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
