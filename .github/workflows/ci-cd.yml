name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: kanban-flowmate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services with Docker Compose
        run: docker compose up -d

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:8081/api/board > /dev/null 2>&1; then
              echo "App is healthy!"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 3
          done

      - name: Run health checks
        run: |
          echo "Testing API endpoints..."
          curl -sf http://localhost:8081/api/board && echo "Board API OK"
          curl -sf http://localhost:8081/metrics | grep -q "http_requests_total" && echo "Metrics endpoint OK"

      - name: Show container status
        run: docker compose ps

      - name: Tear down
        if: always()
        run: docker compose down

  push-to-registry:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kanban-flowmate:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kanban-flowmate:${{ github.sha }}
